name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to PyPI
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      
      - name: Install Python 3.14 via UV
        run: uv python install 3.14
      
      - name: Install build and twine
        run: |
          uv pip install --python 3.14 build twine
      
      - name: Build package
        run: |
          uv run --python 3.14 python -m build --sdist --wheel
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv run --python 3.14 twine upload dist/*
