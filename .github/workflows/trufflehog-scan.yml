name: TruffleHog Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight

jobs:
  scan-secrets:
    name: TruffleHog Secrets Scan
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      actions: read
      security-events: write  # For uploading SARIF results to GitHub Security tab
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning all commits

      - name: Run TruffleHog scan (Native - No Docker)
        shell: bash
        run: |
          set +e  # Disable exit on error
          
          # Download TruffleHog binary
          wget -q https://github.com/trufflesecurity/trufflehog/releases/download/v3.63.0/trufflehog-linux-x86_64
          chmod +x trufflehog-linux-x86_64
          
          # Run the scan
          ./trufflehog-linux-x86_64 git file://. --json --only-verified
          
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No secrets found!"
          else
            echo "⚠️  Secrets detected! Exit code: $EXIT_CODE"
            echo "Review the output above for details."
          fi
          
          # Always exit successfully so workflow continues
          exit 0
      
      # Optional: Want to fail the workflow when secrets are found?
      # Change the last line from "exit 0" to "exit $EXIT_CODE"
