name: MiniMax Code Review (Official)
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: MiniMax Code Review
        uses: minimax-ai/minimax-code-review@v1
        with:
          minimax_api_key: ${{ secrets.MINIMAX_API_KEY }}
          model: MiniMax-M2.7-highspeed
          github_token: ${{ secrets.GITHUB_TOKEN }}
